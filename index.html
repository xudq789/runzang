<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>润藏小铺 · 网上商城</title>
  <style>
    :root {
      --bg: #f6f3ef;
      --card: #fff;
      --text: #2c2419;
      --muted: #6b5d4d;
      --accent: #8b4513;
      --accent2: #c17f3a;
      --border: #e5ddd4;
      --danger: #b33;
      --ok: #1a7f4c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      box-shadow: 0 2px 12px rgba(0,0,0,.12);
    }
    header h1 { margin: 0; font-size: 1.15rem; font-weight: 700; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button, .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      background: rgba(255,255,255,.2);
      color: #fff;
    }
    button.primary, .btn.primary {
      background: #fff;
      color: var(--accent);
    }
    button.ghost { background: transparent; border: 1px solid rgba(255,255,255,.5); }
    main { max-width: 1200px; margin: 0 auto; padding: 20px 16px 80px; }
    .intro { color: var(--muted); margin-bottom: 20px; font-size: 14px; line-height: 1.5; }
    .api-hint {
      font-size: 12px;
      color: var(--muted);
      background: var(--card);
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px dashed var(--border);
      margin-bottom: 20px;
    }
    .api-hint code { background: #f0ebe4; padding: 2px 6px; border-radius: 4px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }
    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: transform .15s, box-shadow .15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: #eee;
    }
    .card-body { padding: 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card h3 { margin: 0; font-size: 15px; line-height: 1.3; }
    .card .desc { font-size: 12px; color: var(--muted); line-height: 1.4; flex: 1; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .price-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
    .price { color: var(--danger); font-weight: 800; font-size: 17px; }
    .card .add-btn {
      padding: 8px 12px;
      font-size: 13px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
    }
    .cart-float {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 40;
      background: var(--accent);
      color: #fff;
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 700;
      box-shadow: 0 6px 20px rgba(139,69,19,.35);
      cursor: pointer;
      border: none;
    }
    .badge {
      display: inline-block;
      min-width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      background: #fff;
      color: var(--accent);
      border-radius: 999px;
      font-size: 12px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: var(--card);
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow: auto;
      border-radius: 18px 18px 0 0;
      padding: 20px;
 animation: up .25s ease;
    }
    @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @media (min-width: 600px) {
      .overlay { align-items: center; }
      .sheet { border-radius: 18px; max-height: 90vh; }
    }
    .sheet h2 { margin: 0 0 16px; font-size: 1.2rem; }
    .sheet label { display: block; font-size: 13px; color: var(--muted); margin: 10px 0 4px; }
    .sheet input, .sheet textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
    }
    .line-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .line-item img { width: 56px; height: 56px; object-fit: cover; border-radius: 8px; }
    .row-btns { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .row-btns button { flex: 1; min-width: 120px; background: var(--accent); color: #fff; }
    .row-btns button.secondary { background: #e8e0d6; color: var(--text); }
    .msg { font-size: 13px; margin-top: 8px; }
    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--ok); }
    .pay-choice { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .pay-choice button { flex: 1; min-width: 140px; background: #1677ff; color: #fff; }
    .pay-choice button.wx { background: #07c160; }
    #qrBox { text-align: center; margin-top: 12px; }
    #qrBox img { max-width: 220px; border-radius: 8px; }
    .user-pill { font-size: 13px; opacity: .95; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pick-row {
      display: block;
      padding: 10px 12px;
      margin: 8px 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .pick-row input { margin-right: 8px; vertical-align: middle; }
    .addr-card, .order-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    .addr-card .addr-actions, .order-card .order-actions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .addr-card button, .order-card button { padding: 6px 12px; font-size: 13px; border-radius: 8px; }
    .addr-card .tag-default { display: inline-block; background: var(--ok); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 6px; margin-left: 6px; vertical-align: middle; }
    .subhint { font-size: 13px; color: var(--muted); margin: 0 0 12px; }
    .sheet .inline-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .sheet .inline-row input[type=checkbox] { width: auto; }
  </style>
</head>
<body>
  <header>
    <h1>润藏小铺</h1>
    <div class="header-actions">
      <span class="user-pill" id="userPill" title="">游客</span>
      <button type="button" class="ghost" id="btnAddrBook" style="display:none">地址管理</button>
      <button type="button" class="ghost" id="btnOrders" style="display:none">我的订单</button>
      <button type="button" class="ghost" id="btnLogin">登录</button>
      <button type="button" class="ghost" id="btnReg">注册</button>
      <button type="button" class="primary" id="btnLogout" style="display:none">退出</button>
    </div>
  </header>
  <main>
    <div class="grid" id="productGrid"></div>
  </main>
  <button type="button" class="cart-float" id="btnCart">购物车 <span class="badge" id="cartCount">0</span></button>

  <div class="overlay" id="modalAuth">
    <div class="sheet">
      <h2 id="authTitle">登录</h2>
      <label>用户名</label>
      <input type="text" id="authUser" autocomplete="username">
      <label>密码</label>
      <input type="password" id="authPass" autocomplete="current-password">
      <p class="msg err" id="authMsg"></p>
      <div class="row-btns">
        <button type="button" class="secondary" data-close>取消</button>
        <button type="button" id="authSubmit">提交</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="modalCart">
    <div class="sheet">
      <h2>购物车</h2>
      <div id="cartLines"></div>
      <div class="row-btns">
        <button type="button" class="secondary" data-close>关闭</button>
        <button type="button" id="btnCheckout" class="primary" style="background:var(--accent);color:#fff">去结算</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="modalAddr">
    <div class="sheet">
      <h2>收货信息</h2>
      <p class="subhint">可选择已保存地址，或选手动填写（仅本次下单使用，不写入通讯录）。</p>
      <div id="checkoutAddrPick"></div>
      <div id="checkoutManualBlock">
        <label>收货人</label>
        <input type="text" id="shipName" placeholder="姓名">
        <label>手机号</label>
        <input type="tel" id="shipPhone" placeholder="11位手机号">
        <label>省</label>
        <input type="text" id="shipProv" placeholder="选填">
        <label>市</label>
        <input type="text" id="shipCity" placeholder="选填">
        <label>区/县</label>
        <input type="text" id="shipDist" placeholder="选填">
        <label>详细地址</label>
        <textarea id="shipDetail" rows="3" placeholder="街道、门牌号等"></textarea>
      </div>
      <p class="msg err" id="addrMsg"></p>
      <div class="row-btns">
        <button type="button" class="secondary" data-close>返回</button>
        <button type="button" id="btnCreateOrder">提交订单</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="modalAddrBook">
    <div class="sheet">
      <h2>地址管理</h2>
      <div id="addrBookList"></div>
      <div class="row-btns">
        <button type="button" id="btnAddrAdd">新增地址</button>
        <button type="button" class="secondary" data-close>关闭</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="modalAddrEditor">
    <div class="sheet">
      <h2 id="addrEditTitle">新增地址</h2>
      <label>收货人</label>
      <input type="text" id="addrE_name" placeholder="姓名">
      <label>手机号</label>
      <input type="tel" id="addrE_phone" placeholder="11位手机号">
      <label>省</label>
      <input type="text" id="addrE_prov" placeholder="选填">
      <label>市</label>
      <input type="text" id="addrE_city" placeholder="选填">
      <label>区/县</label>
      <input type="text" id="addrE_dist" placeholder="选填">
      <label>详细地址</label>
      <textarea id="addrE_detail" rows="3" placeholder="街道、门牌号等"></textarea>
      <label>标签（如：家、公司）</label>
      <input type="text" id="addrE_label" placeholder="选填">
      <div class="inline-row">
        <input type="checkbox" id="addrE_default">
        <label for="addrE_default" style="margin:0">设为默认地址</label>
      </div>
      <p class="msg" id="addrEditMsg"></p>
      <div class="row-btns">
        <button type="button" class="secondary" data-close>取消</button>
        <button type="button" id="addrEditSave">保存</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="modalOrders">
    <div class="sheet">
      <h2>我的订单</h2>
      <div id="orderListBox"></div>
      <div class="row-btns">
        <button type="button" class="secondary" data-close>关闭</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="modalPay">
    <div class="sheet">
      <h2>支付</h2>
      <p id="payOrderInfo" style="font-size:14px;color:var(--muted)"></p>
      <div class="pay-choice">
        <button type="button" id="payAli">支付宝</button>
        <button type="button" class="wx" id="payWx">微信支付</button>
      </div>
      <div id="qrBox"></div>
      <p class="msg" id="payMsg"></p>
      <div class="row-btns">
        <button type="button" class="secondary" data-close>关闭</button>
      </div>
    </div>
  </div>

  <script>
(function () {
  const API_ORIGIN = 'https://runzang.top';
  const API = API_ORIGIN + '/api/store';

  let products = [];
  let cart = [];
  let authMode = 'login';
  let token = localStorage.getItem('store_token') || '';
  let lastOrderNo = '';
  let checkoutAddressId = '';
  let editingAddressId = null;

  function orderStatusText(o) {
    var pay = { unpaid: '未支付', pending: '支付处理中', paid: '已支付', failed: '支付失败' };
    var st = { awaiting_payment: '待付款', awaiting_shipment: '待发货', shipped: '已发货', cancelled: '已取消' };
    return (st[o.status] || o.status) + ' · ' + (pay[o.paymentStatus] || o.paymentStatus);
  }

  function loadCart() {
    try {
      cart = JSON.parse(localStorage.getItem('store_cart') || '[]');
    } catch (e) { cart = []; }
  }
  function saveCart() {
    localStorage.setItem('store_cart', JSON.stringify(cart));
    document.getElementById('cartCount').textContent = cart.reduce((s, i) => s + i.qty, 0);
  }

  function setToken(t) {
    token = t || '';
    if (token) localStorage.setItem('store_token', token);
    else localStorage.removeItem('store_token');
    void updateUserUi();
  }

  async function updateUserUi() {
    const pill = document.getElementById('userPill');
    const btnLogin = document.getElementById('btnLogin');
    const btnReg = document.getElementById('btnReg');
    const btnLogout = document.getElementById('btnLogout');
    const btnAddrBook = document.getElementById('btnAddrBook');
    const btnOrders = document.getElementById('btnOrders');
    if (token) {
      pill.textContent = '已登录';
      pill.title = '';
      btnLogin.style.display = 'none';
      btnReg.style.display = 'none';
      btnLogout.style.display = '';
      btnAddrBook.style.display = '';
      btnOrders.style.display = '';
      try {
        const res = await api('/auth/me');
        if (res.data && res.data.username) {
          pill.textContent = res.data.username;
          pill.title = res.data.username;
        }
      } catch (e) { /* token失效时仍显示已登录，直至请求失败 */ }
    } else {
      pill.textContent = '游客';
      pill.title = '';
      btnLogin.style.display = '';
      btnReg.style.display = '';
      btnLogout.style.display = 'none';
      btnAddrBook.style.display = 'none';
      btnOrders.style.display = 'none';
    }
  }

  async function api(path, opts) {
    const headers = Object.assign({ 'Content-Type': 'application/json' }, (opts && opts.headers) || {});
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const res = await fetch(API + path, Object.assign({}, opts, { headers }));
    const data = await res.json().catch(function () { return {}; });
    if (!res.ok) {
      var errMsg = data.message;
      if (!errMsg && data.errors && data.errors.length) {
        errMsg = data.errors.map(function (er) { return er.msg || er.message; }).filter(Boolean).join('；');
      }
      throw new Error(errMsg || ('HTTP ' + res.status));
    }
    return data;
  }

  function openModal(id) { document.getElementById(id).classList.add('open'); }
  function closeModal(el) { el.classList.remove('open'); }

  document.querySelectorAll('[data-close]').forEach(function (btn) {
    btn.addEventListener('click', function () { closeModal(btn.closest('.overlay')); });
  });

  async function renderCheckoutAddrPick() {
    const box = document.getElementById('checkoutAddrPick');
    const manual = document.getElementById('checkoutManualBlock');
    box.innerHTML = '<p style="color:var(--muted);font-size:13px">加载地址…</p>';
    try {
      const res = await api('/addresses');
      const list = res.data.list || [];
      if (!list.length) {
        box.innerHTML = '<p style="color:var(--muted);font-size:13px">暂无保存地址，请在下方填写收货信息</p>';
        checkoutAddressId = '';
        manual.style.display = '';
        return;
      }
      const def = list.find(function (a) { return a.isDefault; }) || list[0];
      checkoutAddressId = String(def._id);
      var html = '<div style="font-size:13px;margin-bottom:8px;color:var(--muted)">选择收货地址</div>';
      html += list.map(function (a) {
        var id = String(a._id);
        var checked = id === checkoutAddressId ? ' checked' : '';
        var tag = a.label ? ' [' + escapeHtml(a.label) + ']' : '';
        var reg = [a.province, a.city, a.district].filter(Boolean).join('');
        var line = escapeHtml(reg + a.addressDetail);
        return '<label class="pick-row"><input type="radio" name="pickAddr" value="' + id + '"' + checked + '> ' +
          escapeHtml(a.recipientName) + ' ' + escapeHtml(a.phone) + tag + '<br><span style="color:var(--muted);font-size:12px">' + line + '</span></label>';
      }).join('');
      html += '<label class="pick-row"><input type="radio" name="pickAddr" value=""> 手动填写新地址（不保存）</label>';
      box.innerHTML = html;
      box.querySelectorAll('input[name=pickAddr]').forEach(function (r) {
        r.addEventListener('change', function () {
          checkoutAddressId = r.value;
          manual.style.display = r.value ? 'none' : '';
        });
      });
      manual.style.display = checkoutAddressId ? 'none' : '';
    } catch (e) {
      box.innerHTML = '<p class="msg err">' + escapeHtml(e.message) + '</p>';
      checkoutAddressId = '';
      manual.style.display = '';
    }
  }

  async function loadAddrBookList() {
    const box = document.getElementById('addrBookList');
    box.innerHTML = '<p style="color:var(--muted)">加载中…</p>';
    try {
      const res = await api('/addresses');
      const list = res.data.list || [];
      if (!list.length) {
        box.innerHTML = '<p style="color:var(--muted)">暂无地址，点击「新增地址」添加</p>';
        return;
      }
      box.innerHTML = list.map(function (a) {
        var reg = [a.province, a.city, a.district].filter(Boolean).join('');
        var tag = a.isDefault ? '<span class="tag-default">默认</span>' : '';
        return (
          '<div class="addr-card" data-aid="' + String(a._id) + '">' +
            '<div>' + escapeHtml(a.recipientName) + ' ' + escapeHtml(a.phone) + tag + '</div>' +
            '<div style="color:var(--muted);font-size:13px;margin-top:6px">' + escapeHtml(reg + a.addressDetail) + '</div>' +
            '<div class="addr-actions">' +
              '<button type="button" data-edit-aid="' + String(a._id) + '">编辑</button>' +
              '<button type="button" data-def-aid="' + String(a._id) + '" style="background:#e8e0d6;color:var(--text)">' + (a.isDefault ? '已是默认' : '设默认') + '</button>' +
              '<button type="button" data-del-aid="' + String(a._id) + '" style="background:#fdd;color:#600">删除</button>' +
            '</div>' +
          '</div>'
        );
      }).join('');
      box.querySelectorAll('[data-edit-aid]').forEach(function (b) {
        b.addEventListener('click', function () { openAddrEditor(b.getAttribute('data-edit-aid')); });
      });
      box.querySelectorAll('[data-def-aid]').forEach(function (b) {
        b.addEventListener('click', async function () {
          var id = b.getAttribute('data-def-aid');
          if (b.textContent === '已是默认') return;
          try {
            await api('/addresses/' + encodeURIComponent(id) + '/default', { method: 'PATCH', body: '{}' });
            await loadAddrBookList();
          } catch (err) { alert(err.message); }
        });
      });
      box.querySelectorAll('[data-del-aid]').forEach(function (b) {
        b.addEventListener('click', async function () {
          var id = b.getAttribute('data-del-aid');
          if (!confirm('确定删除该地址？')) return;
          try {
            await api('/addresses/' + encodeURIComponent(id), { method: 'DELETE' });
            await loadAddrBookList();
          } catch (err) { alert(err.message); }
        });
      });
    } catch (e) {
      box.innerHTML = '<p class="msg err">' + escapeHtml(e.message) + '</p>';
    }
  }

  async function loadOrderList() {
    const box = document.getElementById('orderListBox');
    box.innerHTML = '<p style="color:var(--muted)">加载中…</p>';
    try {
      const res = await api('/orders?pageSize=20');
      const list = res.data.list || [];
      if (!list.length) {
        box.innerHTML = '<p style="color:var(--muted)">暂无订单</p>';
        return;
      }
      box.innerHTML = list.map(function (o) {
        var canPay = o.paymentStatus !== 'paid' && o.status !== 'cancelled';
        var dateStr = o.createdAt ? new Date(o.createdAt).toLocaleString() : '';
        var lines = (o.items || []).map(function (it) {
          return escapeHtml(it.name) + ' ×' + it.quantity;
        }).join('；');
        return (
          '<div class="order-card">' +
            '<div><strong>订单号</strong> ' + escapeHtml(o.orderNo) + '</div>' +
            '<div style="color:var(--muted);font-size:13px;margin-top:4px">' + orderStatusText(o) + '</div>' +
            '<div style="margin-top:6px">¥' + o.totalAmount + ' · ' + dateStr + '</div>' +
            '<div style="font-size:13px;margin-top:6px;color:var(--muted)">' + lines + '</div>' +
            '<div class="order-actions">' +
              (canPay ? '<button type="button" style="background:var(--accent);color:#fff" data-pay-order="' + escapeHtml(o.orderNo) + '" data-amt="' + o.totalAmount + '">去支付</button>' : '') +
            '</div>' +
          '</div>'
        );
      }).join('');
      box.querySelectorAll('[data-pay-order]').forEach(function (b) {
        b.addEventListener('click', function () {
          lastOrderNo = b.getAttribute('data-pay-order');
          var amt = b.getAttribute('data-amt');
          closeModal(document.getElementById('modalOrders'));
          document.getElementById('payOrderInfo').textContent = '订单号 ' + lastOrderNo + ' 金额 \u00a5' + amt;
          document.getElementById('payMsg').textContent = '';
          document.getElementById('qrBox').innerHTML = '';
          openModal('modalPay');
        });
      });
    } catch (e) {
      box.innerHTML = '<p class="msg err">' + escapeHtml(e.message) + '</p>';
    }
  }

  function openAddrEditor(id) {
    editingAddressId = id || null;
    var msg = document.getElementById('addrEditMsg');
    msg.textContent = '';
    msg.className = 'msg';
    if (!id) {
      document.getElementById('addrEditTitle').textContent = '新增地址';
      document.getElementById('addrE_name').value = '';
      document.getElementById('addrE_phone').value = '';
      document.getElementById('addrE_prov').value = '';
      document.getElementById('addrE_city').value = '';
      document.getElementById('addrE_dist').value = '';
      document.getElementById('addrE_detail').value = '';
      document.getElementById('addrE_label').value = '';
      document.getElementById('addrE_default').checked = true;
      openModal('modalAddrEditor');
    } else {
      document.getElementById('addrEditTitle').textContent = '编辑地址';
      openModal('modalAddrEditor');
      (async function () {
        try {
          const res = await api('/addresses');
          const a = (res.data.list || []).find(function (x) { return String(x._id) === String(id); });
          if (!a) throw new Error('地址不存在');
          document.getElementById('addrE_name').value = a.recipientName || '';
          document.getElementById('addrE_phone').value = a.phone || '';
          document.getElementById('addrE_prov').value = a.province || '';
          document.getElementById('addrE_city').value = a.city || '';
          document.getElementById('addrE_dist').value = a.district || '';
          document.getElementById('addrE_detail').value = a.addressDetail || '';
          document.getElementById('addrE_label').value = a.label || '';
          document.getElementById('addrE_default').checked = !!a.isDefault;
        } catch (err) {
          msg.textContent = err.message;
          msg.className = 'msg err';
        }
      })();
    }
  }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = products.map(function (p) {
      return (
        '<article class="card">' +
 '<img src="' + p.image + '" alt="" loading="lazy">' +
          '<div class="card-body">' +
            '<h3>' + escapeHtml(p.name) + '</h3>' +
            '<p class="desc">' + escapeHtml(p.description || '') + '</p>' +
            '<div class="price-row">' +
              '<span class="price">¥' + p.price + '</span>' +
              '<button type="button" class="add-btn" data-add="' + p._id + '">加入购物车</button>' +
            '</div>' +
          '</div>' +
        '</article>'
      );
    }).join('');
    grid.querySelectorAll('[data-add]').forEach(function (btn) {
      btn.addEventListener('click', function () { addToCart(btn.getAttribute('data-add')); });
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  function addToCart(pid) {
    const p = products.find(function (x) { return x._id === pid; });
    if (!p) return;
    const line = cart.find(function (x) { return x.productId === pid; });
    if (line) line.qty += 1;
    else cart.push({ productId: pid, name: p.name, price: p.price, image: p.image, qty: 1 });
    saveCart();
  }

  function renderCartLines() {
    const box = document.getElementById('cartLines');
    if (!cart.length) {
      box.innerHTML = '<p style="color:var(--muted)">购物车是空的</p>';
      return;
    }
    box.innerHTML = cart.map(function (l) {
      return (
        '<div class="line-item">' +
          (l.image ? '<img src="' + l.image + '" alt="">' : '') +
          '<div style="flex:1">' +
            '<div>' + escapeHtml(l.name) + '</div>' +
            '<div style="color:var(--muted);font-size:13px">¥' + l.price + ' × ' + l.qty + '</div>' +
          '</div>' +
          '<button type="button" data-rm="' + l.productId + '" style="background:#ddd;color:#333;padding:6px 10px">删</button>' +
        '</div>'
      );
    }).join('');
    box.querySelectorAll('[data-rm]').forEach(function (b) {
      b.addEventListener('click', function () {
        var id = b.getAttribute('data-rm');
        cart = cart.filter(function (x) { return x.productId !== id; });
        saveCart();
        renderCartLines();
      });
    });
  }

  document.getElementById('btnCart').addEventListener('click', function () {
    renderCartLines();
    openModal('modalCart');
  });

  document.getElementById('btnCheckout').addEventListener('click', async function () {
    if (!cart.length) { alert('购物车为空'); return; }
    if (!token) { alert('请先登录'); openModal('modalAuth'); authMode = 'login'; document.getElementById('authTitle').textContent = '登录'; return; }
    closeModal(document.getElementById('modalCart'));
    document.getElementById('addrMsg').textContent = '';
    openModal('modalAddr');
    await renderCheckoutAddrPick();
  });

  document.getElementById('btnAddrBook').addEventListener('click', async function () {
    openModal('modalAddrBook');
    await loadAddrBookList();
  });
  document.getElementById('btnOrders').addEventListener('click', async function () {
    openModal('modalOrders');
    await loadOrderList();
  });
  document.getElementById('btnAddrAdd').addEventListener('click', function () {
    openAddrEditor(null);
  });
  document.getElementById('addrEditSave').addEventListener('click', async function () {
    var msg = document.getElementById('addrEditMsg');
    msg.textContent = '';
    msg.className = 'msg';
    var body = {
      recipientName: document.getElementById('addrE_name').value.trim(),
      phone: document.getElementById('addrE_phone').value.trim(),
      province: document.getElementById('addrE_prov').value.trim(),
      city: document.getElementById('addrE_city').value.trim(),
      district: document.getElementById('addrE_dist').value.trim(),
      addressDetail: document.getElementById('addrE_detail').value.trim(),
      label: document.getElementById('addrE_label').value.trim(),
      isDefault: document.getElementById('addrE_default').checked
    };
    if (!body.recipientName || !body.addressDetail) {
      msg.textContent = '请填写收货人与详细地址';
      msg.className = 'msg err';
      return;
    }
    if (!/^1\d{10}$/.test(body.phone)) {
      msg.textContent = '请输入正确手机号';
      msg.className = 'msg err';
      return;
    }
    try {
      if (editingAddressId) {
        await api('/addresses/' + encodeURIComponent(editingAddressId), { method: 'PATCH', body: JSON.stringify(body) });
      } else {
        await api('/addresses', { method: 'POST', body: JSON.stringify(body) });
      }
      closeModal(document.getElementById('modalAddrEditor'));
      if (document.getElementById('modalAddrBook').classList.contains('open')) {
        await loadAddrBookList();
      }
      if (document.getElementById('modalAddr').classList.contains('open')) {
        await renderCheckoutAddrPick();
      }
    } catch (err) {
      msg.textContent = err.message || '保存失败';
      msg.className = 'msg err';
    }
  });

  document.getElementById('btnLogin').addEventListener('click', function () {
    authMode = 'login';
    document.getElementById('authTitle').textContent = '登录';
    document.getElementById('authMsg').textContent = '';
    openModal('modalAuth');
  });
  document.getElementById('btnReg').addEventListener('click', function () {
    authMode = 'register';
    document.getElementById('authTitle').textContent = '注册';
    document.getElementById('authMsg').textContent = '';
    openModal('modalAuth');
  });
  document.getElementById('btnLogout').addEventListener('click', function () { setToken(''); });

  document.getElementById('authSubmit').addEventListener('click', async function () {
    const u = document.getElementById('authUser').value.trim();
    const p = document.getElementById('authPass').value;
    const msg = document.getElementById('authMsg');
    msg.textContent = '';
    try {
      if (authMode === 'register') {
        await api('/auth/register', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
        msg.textContent = '注册成功，请登录';
        msg.className = 'msg ok';
        authMode = 'login';
        document.getElementById('authTitle').textContent = '登录';
        return;
      }
      const res = await api('/auth/login', { method: 'POST', body: JSON.stringify({ username: u, password: p }) });
      setToken(res.data.token);
      closeModal(document.getElementById('modalAuth'));
    } catch (e) {
      msg.textContent = e.message || '失败';
      msg.className = 'msg err';
    }
  });

  document.getElementById('btnCreateOrder').addEventListener('click', async function () {
    const msg = document.getElementById('addrMsg');
    msg.textContent = '';
    const items = cart.map(function (l) { return { productId: l.productId, quantity: l.qty }; });
    var payload = { items: items };
    if (checkoutAddressId) {
      payload.addressId = checkoutAddressId;
    } else {
      var shipping = {
        recipientName: document.getElementById('shipName').value.trim(),
        phone: document.getElementById('shipPhone').value.trim(),
        province: document.getElementById('shipProv').value.trim(),
        city: document.getElementById('shipCity').value.trim(),
        district: document.getElementById('shipDist').value.trim(),
        addressDetail: document.getElementById('shipDetail').value.trim()
      };
      if (!/^1\d{10}$/.test(shipping.phone)) {
        msg.textContent = '请输入正确手机号';
        return;
      }
      if (!shipping.recipientName || !shipping.addressDetail) {
        msg.textContent = '请填写收货人与详细地址';
        return;
      }
      payload.shipping = shipping;
    }
    try {
      const res = await api('/orders', { method: 'POST', body: JSON.stringify(payload) });
      lastOrderNo = res.data.orderNo;
      cart = [];
      saveCart();
      closeModal(document.getElementById('modalAddr'));
      document.getElementById('payOrderInfo').textContent = '订单号 ' + lastOrderNo + ' 金额 \u00a5' + res.data.totalAmount;
      document.getElementById('payMsg').textContent = '';
      document.getElementById('qrBox').innerHTML = '';
      openModal('modalPay');
    } catch (e) {
      msg.textContent = e.message || '下单失败';
    }
  });

  function showPayResult(data, method) {
    const qr = document.getElementById('qrBox');
    const payMsg = document.getElementById('payMsg');
    qr.innerHTML = '';
    payMsg.textContent = '';
    if (data.paymentUrl) {
      payMsg.innerHTML = '正在打开支付页…若被拦截请<a href="' + data.paymentUrl + '" target="_blank" rel="noopener">点此跳转</a>';
      window.open(data.paymentUrl, '_blank', 'noopener');
 return;
    }
    if (data.qrCodeUrl || data.codeUrl) {
      var src = data.qrCodeUrl || ('https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=' + encodeURIComponent(data.codeUrl));
      qr.innerHTML = '<p style="font-size:14px">请使用' + (method === 'wechatpay' ? '微信' : '') + '扫码</p><img src="' + src + '" alt="qr">';
      payMsg.textContent = '支付完成后请稍候查询订单状态。';
    }
  }

  async function doPay(method) {
    if (!lastOrderNo) return;
    document.getElementById('payMsg').textContent = '创建支付中…';
    try {
      const res = await api('/orders/' + encodeURIComponent(lastOrderNo) + '/pay', {
        method: 'POST',
        body: JSON.stringify({ paymentMethod: method })
      });
      showPayResult(res.data, method);
    } catch (e) {
      document.getElementById('payMsg').textContent = e.message || '支付发起失败';
    }
  }

  document.getElementById('payAli').addEventListener('click', function () { doPay('alipay'); });
  document.getElementById('payWx').addEventListener('click', function () { doPay('wechatpay'); });

  loadCart();
  saveCart();
  void updateUserUi();

  (async function init() {
    try {
      const res = await fetch(API + '/products');
      const data = await res.json();
      if (!data.success) throw new Error(data.message || '加载商品失败');
      products = data.data.list || [];
      renderProducts();
    } catch (e) {
      document.getElementById('productGrid').innerHTML = '<p class="msg err">无法加载商品：' + escapeHtml(e.message) + '。请检查 API_ORIGIN 与后端服务。</p>';
    }
  })();
})();
  </script>
</body>
</html>
