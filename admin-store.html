<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商城订单管理</title>
  <style>
    body { font-family: "Segoe UI", "PingFang SC", sans-serif; margin: 0; background: #f4f1ec; color: #2c2419; }
    header { background: #5c4033; color: #fff; padding: 14px 18px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
    h1 { margin: 0; font-size: 1.1rem; }
    main { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .panel { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
    label { font-size: 13px; color: #666; margin-right: 6px; }
    input, select, button { padding: 8px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
    button { background: #5c4033; color: #fff; border: none; cursor: pointer; }
    button.secondary { background: #888; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #e5e0d8; vertical-align: top; }
    th { color: #666; font-weight: 600; }
    tr:hover { background: #faf8f5; }
    .login-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    pre { background: #f0ebe4; padding: 12px; border-radius: 8px; overflow: auto; font-size: 12px; max-height: 420px; }
    .err { color: #a22; font-size: 13px; margin-top: 8px; }
    .muted { color: #666; font-size: 12px; }
 </style>
</head>
<body>
  <header>
    <h1>润藏 · 商城订单管理</h1>
    <div class="login-row" id="loginBar">
      <input type="text" id="admUser" placeholder="管理员用户名" autocomplete="username">
      <input type="password" id="admPass" placeholder="密码" autocomplete="current-password">
      <button type="button" id="btnLogin">登录</button>
      <span class="muted">使用 /api/admin/login 同一套管理员账号</span>
    </div>
  </header>
  <main>
    <div class="panel">
      <p class="muted">将 <code>API_ORIGIN</code> 改为你的支付后台地址（与 CORS 一致）。</p>
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:10px">
        <label>订单号</label><input type="text" id="fOrder" placeholder="模糊">
        <label>用户名</label><input type="text" id="fUser" placeholder="买家用户名">
        <label>支付</label>
        <select id="fPay">
          <option value="">全部</option>
          <option value="unpaid">unpaid</option>
          <option value="pending">pending</option>
          <option value="paid">paid</option>
          <option value="failed">failed</option>
        </select>
        <label>状态</label>
        <select id="fStat">
          <option value="">全部</option>
          <option value="awaiting_payment">awaiting_payment</option>
          <option value="awaiting_shipment">awaiting_shipment</option>
          <option value="shipped">shipped</option>
          <option value="cancelled">cancelled</option>
        </select>
        <button type="button" id="btnLoad">查询</button>
      </div>
      <p class="err" id="listErr"></p>
      <div style="overflow:auto;margin-top:12px">
        <table>
          <thead><tr><th>订单号</th><th>用户</th><th>金额</th><th>支付</th><th>状态</th><th>时间</th><th></th></tr></thead>
          <tbody id="tb"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <h2 style="margin-top:0;font-size:1rem">订单详情</h2>
      <p class="muted" id="detailHint">点击上表「详情」</p>
      <pre id="detailPre" style="display:none"></pre>
      <div id="editPanel" style="display:none;margin-top:12px">
        <label>履约状态</label>
        <select id="eStat">
          <option value="awaiting_payment">awaiting_payment</option>
          <option value="awaiting_shipment">awaiting_shipment</option>
          <option value="shipped">shipped</option>
          <option value="cancelled">cancelled</option>
        </select>
        <label style="margin-left:12px">支付状态</label>
        <select id="ePay">
          <option value="unpaid">unpaid</option>
          <option value="pending">pending</option>
          <option value="paid">paid</option>
          <option value="failed">failed</option>
        </select>
        <div style="margin-top:8px">
          <label>备注</label><input type="text" id="eRemark" style="width:min(420px,90%)" placeholder="管理员备注">
        </div>
        <button type="button" id="btnSave" style="margin-top:10px">保存修改</button>
        <p class="err" id="saveErr"></p>
      </div>
    </div>
  </main>
  <script>
(function () {
  const API_ORIGIN = 'http://localhost:3000';
  let adminToken = localStorage.getItem('admin_token_store') || '';
  let currentOrderNo = '';

  function authHeaders() {
    return {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + adminToken
    };
  }

  document.getElementById('btnLogin').onclick = async function () {
    const u = document.getElementById('admUser').value.trim();
    const p = document.getElementById('admPass').value;
    const r = await fetch(API_ORIGIN + '/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const j = await r.json().catch(function () { return {}; });
    if (!j.success || !j.data || !j.data.token) {
      alert(j.message || '登录失败');
      return;
    }
    adminToken = j.data.token;
    localStorage.setItem('admin_token_store', adminToken);
    alert('已登录');
  };

  function row(o) {
    const u = (o.userId && o.userId.username) ? o.userId.username : '';
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' + o.orderNo + '</td>' +
      '<td>' + u + '</td>' +
      '<td>' + o.totalAmount + '</td>' +
      '<td>' + o.paymentStatus + '</td>' +
      '<td>' + o.status + '</td>' +
      '<td>' + (o.createdAt ? String(o.createdAt).slice(0, 19) : '') + '</td>' +
      '<td><button type="button" class="secondary btn-d">详情</button></td>';
    tr.querySelector('.btn-d').onclick = function () { loadDetail(o.orderNo); };
    return tr;
  }

  document.getElementById('btnLoad').onclick = async function () {
    const err = document.getElementById('listErr');
    err.textContent = '';
    if (!adminToken) { err.textContent = '请先登录'; return; }
    const q = new URLSearchParams();
    q.set('page', '1');
    q.set('pageSize', '50');
    const on = document.getElementById('fOrder').value.trim();
    const us = document.getElementById('fUser').value.trim();
    const ps = document.getElementById('fPay').value;
    const st = document.getElementById('fStat').value;
    if (on) q.set('orderNo', on);
    if (us) q.set('username', us);
    if (ps) q.set('paymentStatus', ps);
    if (st) q.set('status', st);
    const r = await fetch(API_ORIGIN + '/api/admin/store/orders?' + q.toString(), { headers: authHeaders() });
    const j = await r.json().catch(function () { return {}; });
    if (!j.success) { err.textContent = j.message || '加载失败'; return; }
    const tb = document.getElementById('tb');
    tb.innerHTML = '';
    (j.data.list || []).forEach(function (o) { tb.appendChild(row(o)); });
  };

  async function loadDetail(orderNo) {
    currentOrderNo = orderNo;
    document.getElementById('detailHint').style.display = 'none';
    const pre = document.getElementById('detailPre');
    pre.style.display = 'block';
    document.getElementById('editPanel').style.display = 'block';
    document.getElementById('saveErr').textContent = '';
    const r = await fetch(API_ORIGIN + '/api/admin/store/orders/' + encodeURIComponent(orderNo), { headers: authHeaders() });
    const j = await r.json().catch(function () { return {}; });
    pre.textContent = JSON.stringify(j.data || j, null, 2);
    if (j.success && j.data) {
      document.getElementById('eStat').value = j.data.status || 'awaiting_payment';
      document.getElementById('ePay').value = j.data.paymentStatus || 'unpaid';
      document.getElementById('eRemark').value = j.data.adminRemark || '';
    }
  }

  document.getElementById('btnSave').onclick = async function () {
    document.getElementById('saveErr').textContent = '';
    if (!currentOrderNo) return;
    const body = {
      status: document.getElementById('eStat').value,
      paymentStatus: document.getElementById('ePay').value,
      adminRemark: document.getElementById('eRemark').value
    };
    const r = await fetch(API_ORIGIN + '/api/admin/store/orders/' + encodeURIComponent(currentOrderNo), {
      method: 'PATCH',
      headers: authHeaders(),
      body: JSON.stringify(body)
    });
    const j = await r.json().catch(function () { return {}; });
    if (!j.success) {
      document.getElementById('saveErr').textContent = j.message || '保存失败';
      return;
    }
    document.getElementById('detailPre').textContent = JSON.stringify(j.data, null, 2);
    alert('已保存');
  };
})();
  </script>
</body>
</html>
